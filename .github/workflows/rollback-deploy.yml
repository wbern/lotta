name: Deploy rollback bundle

on:
  push:
    # Match semver tags (v1.2.3) plus prereleases (v1.2.3-rc.1). Both are
    # snapshot-deployed under /v/<version>/ so the rollback picker can target
    # either. Stray non-version tags are ignored.
    tags: ['v[0-9]*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string without leading v (e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  # Share the 'pages' group with the mainline deploy so they serialize
  # against gh-pages and never race the clean step.
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            value="${{ inputs.version }}"
          else
            value="${GITHUB_REF_NAME#v}"
          fi
          # The push-trigger tag filter is loose (v[0-9]*), so also reject
          # anything here that isn't strict semver with an optional prerelease
          # suffix before we deploy it under /v/<version>/.
          if ! [[ "$value" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid version string: $value"
            exit 1
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build rollback bundle
        run: pnpm build:rollback
        env:
          ROLLBACK_VERSION: ${{ steps.ver.outputs.value }}
          VITE_METERED_API_KEY: ${{ secrets.VITE_METERED_API_KEY }}

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist-rollback/index.html dist-rollback/404.html

      - name: Deploy rollback bundle to v/<version>/
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist-rollback
          target-folder: v/${{ steps.ver.outputs.value }}
          clean: true

      - name: Check out gh-pages for versions.json regeneration
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-checkout
          fetch-depth: 0

      - name: Regenerate and commit versions.json to gh-pages
        run: |
          # Pages concurrency serialises workflow *runs*, but a manual push to
          # gh-pages between our checkout and the git push below would still
          # reject us. Resync + regenerate + push, up to a few attempts.
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            (cd gh-pages-checkout && git fetch origin gh-pages && git reset --hard origin/gh-pages)
            node scripts/build-versions-json.mjs \
              --from-dir gh-pages-checkout \
              --out gh-pages-checkout/versions.json
            cd gh-pages-checkout
            if git diff --quiet versions.json; then
              echo "versions.json already up to date on attempt $attempt"
              exit 0
            fi
            git add versions.json
            git commit -m "chore: regenerate versions.json for v${{ steps.ver.outputs.value }}"
            if git push origin gh-pages; then
              echo "pushed versions.json on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt rejected; resyncing and retrying"
            cd ..
          done
          echo "gave up after 3 attempts"
          exit 1
